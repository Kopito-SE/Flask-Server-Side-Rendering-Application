<style>
.admin-container{
    max-width:900px;
    margin:auto;
    padding:40px;
    font-family:Arial, Helvetica, sans-serif;
}

.admin-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:20px;
    color:#333;
}

.add-btn{
    background:#667eea;
    color:white;
    padding:10px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:600;
}

.add-btn:hover{
    background:#5563d6;
}

.category-card{
    background:#ffffff;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.category-name{
    font-size:1.4rem;
    margin-bottom:10px;
}

.action-links a{
    margin-right:10px;
    text-decoration:none;
    padding:6px 12px;
    border-radius:6px;
    font-weight:600;
}

.edit-link{
    background:#10b981;
    color:white;
}

.delete-link{
    background:#ef4444;
    color:white;
}

.edit-link:hover{
    background:#059669;
}

.delete-link:hover{
    background:#dc2626;
}
</style>

{% include "_home_nav.html" %}


<div class="admin-container">

<h2 class="admin-title">Admin: Manage Categories</h2>

<a href="{{url_for('main.add_category')}}" class="add-btn">
+ Add New Category
</a>

<br><br>

{% for cat in categories %}

<div class="category-card">

<h3 class="category-name">{{ cat.name }}</h3>

<div class="action-links">

<a href="{{url_for('main.edit_category',category_id=cat.id)}}" class="edit-link">
Edit
</a>

<a href="{{url_for('main.delete_category',category_id=cat.id)}}" 
class="delete-link"
onclick="return confirm('Are you sure you want to delete?')">
Delete
</a>

</div>

</div>

{% endfor %}

</div>
