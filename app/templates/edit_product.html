<h2>Edit Product</h2>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="name" value="{{ product.name }}" placeholder="Product Name"><br><br>

<input type="number" step="0.01" name="price" value="{{ product.price }}" placeholder="Price"><br><br>

<textarea name="description" placeholder="Description">{{ product.description }}</textarea><br><br>

<select name="category_id">
    {% for cat in categories %}
    <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
    {% endfor %}
</select><br><br>

<input type="file" name="image"><br><br>

<button type="submit">Update Product</button>

</form>
