<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>
    <h2>All Products</h2>

    {% for product in products %}
        <div>
            {% if product.image %}
                <img src="{{ url_for('static', filename='uploads/' ~ product.image) }}" alt="{{ product.name }}" width="200"><br>
            {% endif %}
            <h3>{{ product.name }}</h3>
            <p>{{ product.description }}</p>
            <strong>Ksh {{ product.price }}</strong>
            <hr>
            <a href="{{ url_for('main.add_to_cart', product_id=product.id) }}">
Add To Cart
</a>
<hr><br>
        </div>
    {% endfor %}

    <a href="{{ url_for('main.add_product') }}">Add Product</a><hr><br>

</body>
</html>
