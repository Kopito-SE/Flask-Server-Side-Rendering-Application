<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    h1, h3 {
      color: #343a40;
      font-weight: 600;
    }

    .card {
      border-radius: 0.75rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15);
    }

    .card h5 {
      color: #6c757d;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .card h2 {
      font-size: 2rem;
      font-weight: 700;
      color: #212529;
    }

    .stats-row {
      gap: 1rem;
    }

    canvas {
      background: #ffffff;
      border-radius: 0.5rem;
      padding: 1rem;
      box-shadow: 0 0.25rem 0.75rem rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center mb-5">Admin Dashboard</h1>

    <!-- Stats cards -->
    <div class="row stats-row">
      <div class="col-md-3">
        <div class="card text-center shadow-sm p-3">
          <div class="card-body">
            <h5>Total Users</h5>
            <h2>{{ total_users }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow-sm p-3">
          <div class="card-body">
            <h5>Total Products</h5>
            <h2>{{ total_products }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow-sm p-3">
          <div class="card-body">
            <h5>Total Categories</h5>
            <h2>{{ total_categories }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3">
        <div class="card text-center shadow-sm p-3">
          <div class="card-body">
            <h5>Total Orders</h5>
            <h2>{{ total_orders }}</h2>
          </div>
        </div>
      </div>

      <div class="col-md-3 mt-3">
        <div class="card text-center shadow-sm p-3">
          <div class="card-body">
            <h5>Total Revenue</h5>
            <h2>Ksh {{ revenue }}</h2>
          </div>
        </div>
      </div>
    </div>

    <!-- Revenue chart -->
    <div class="row mt-5">
      <div class="col-12">
        <h3 class="mb-3">Revenue Overview</h3>
        <canvas id="revenueChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('revenueChart');

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Revenue'],
        datasets: [{
          label: 'Total Revenue',
          data: [{{ revenue }}],
          backgroundColor: '#0d6efd',
          borderRadius: 5,
          borderWidth: 1
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  </script>
</body>
