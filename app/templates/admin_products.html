<h2>Admin: Products</h2>
    <a href="{{url_for('main.add_product')}}">Add New Product</a>
    <br><br>
    {% for product in products %}
    <div>
        <h3>{{product.name}}</h3>
        {% if product.image %}
        <img src="{{url_for('static',filename='uploads/' + product.image)}}" width="150">
        {% endif %}
        <p>{{product.description}}</p>
        <strong>ksh {{product.price}}</strong>
        <p>Category: {{product.category.name if product.category else "None"}}</p>

        <a href="{{url_for('main.edit_product',product_id=product.id)}}">Edit</a>
        <a href="{{url_for('main.delete_product',product_id=product.id)}}" onclick="return confirm('Are you sure you want to delete this Product?')">Delete</a>
        <hr>
        
    </div>
    {% endfor %}
